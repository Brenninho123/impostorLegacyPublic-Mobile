name: Android

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r21e
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Install Haxe libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null
          haxelib install lime > /dev/null
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Copy lime ndll to git fork
        run: |
          LIME_RELEASE=$(find ~/haxelib/lime -maxdepth 2 -name "lime.ndll" | head -1)
          LIME_GIT_NDLL=".haxelib/lime/git/ndll/Linux64"
          mkdir -p "$LIME_GIT_NDLL"
          if [ -n "$LIME_RELEASE" ]; then
            cp "$(dirname $LIME_RELEASE)/." "$LIME_GIT_NDLL/" -r
          else
            LIME_RELEASE_DIR=$(find ~/haxelib/lime -maxdepth 1 -type d | sort -V | tail -1)
            cp -r "$LIME_RELEASE_DIR/ndll/." ".haxelib/lime/git/ndll/"
          fi

      - name: Setup Lime Android config
        run: |
          printf '%s\n' \
            "$ANDROID_SDK_ROOT" \
            "$ANDROID_NDK_HOME" \
            "$JAVA_HOME" \
            "34.0.0" \
            "android-34" \
            "" | haxelib run lime setup android

      - name: Compile
        run: haxelib run lime build android -release ${{ inputs.buildFlags != '' && format('-D {0}', inputs.buildFlags) || '' }}

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImpostorLegacy-android
          path: export/release/android/bin/app/build/outputs/apk/release/app-release-unsigned.apk
