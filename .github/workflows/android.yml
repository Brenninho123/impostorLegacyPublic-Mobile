name: Android

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r21e
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Install Haxe libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null
          haxelib install hxpkg
          haxelib run hxpkg install

      - name: Setup Lime Android config
        run: |
          mkdir -p ~/.lime
          cat > ~/.lime/config.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <config>
            <section id="android">
              <set name="ANDROID_SDK" value="$ANDROID_SDK_ROOT" />
              <set name="ANDROID_NDK_ROOT" value="$ANDROID_NDK_HOME" />
              <set name="JAVA_HOME" value="$JAVA_HOME" />
              <set name="ANDROID_BUILD_TOOLS" value="34.0.0" />
              <set name="ANDROID_PLATFORM" value="android-34" />
            </section>
          </config>
          EOF

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            wayland-protocols \
            wayland-scanner++ \
            libxrandr-dev \
            libx11-dev \
            libxi-dev \
            libxext-dev \
            libudev-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev

      - name: Find and Patch BMP.cpp
        run: |
          BMP=$(find ~ -name "BMP.cpp" -path "*/graphics/format/*" 2>/dev/null | head -1)
          echo "BMP found at: $BMP"
          if [ -n "$BMP" ]; then
            grep -q '#include <climits>' "$BMP" || sed -i '/#include <SDL3_image\/SDL_image.h>/a #include <climits>' "$BMP"
            echo "patched"
          else
            echo "BMP.cpp not found, skipping patch"
          fi

      - name: Cache Lime ndll
        id: cache_lime
        uses: actions/cache@v4
        with:
          path: .haxelib/lime/git/ndll
          key: lime-ndll-${{ hashFiles('.hxpkg') }}-v2

      - name: Rebuild Lime
        if: steps.cache_lime.outputs.cache-hit != 'true'
        run: |
          haxelib run lime rebuild linux -DHXCPP_COMPILE_THREADS=4
          haxelib run lime rebuild android -DHXCPP_COMPILE_THREADS=4

      - name: Compile
        run: haxelib run lime build android -release ${{ inputs.buildFlags != '' && format('-D {0}', inputs.buildFlags) || '' }}

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImpostorLegacy-android
          path: export/release/android/bin/app/build/outputs/apk/release/app-release-unsigned.apk
