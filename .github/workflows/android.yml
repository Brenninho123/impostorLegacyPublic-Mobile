name: Build Android

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

jobs:
  Android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential gcc-13 g++-13 \
            libwayland-dev libwayland-bin wayland-protocols wayland-scanner++ \
            libasound2-dev libpulse-dev libjack-jackd2-dev libpipewire-0.3-dev \
            libgl1-mesa-dev libegl1-mesa-dev libglu1-mesa-dev \
            libdbus-1-dev libudev-dev libxkbcommon-dev \
            libx11-dev libxext-dev libx11-xcb-dev libxfixes-dev \
            libxss-dev libxrender-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxxf86vm-dev \
            libgbm-dev libdrm-dev libdecor-0-dev libvulkan-dev pkg-config

      - name: Install Haxe libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null --quiet
          haxelib install hxpkg --quiet
          haxelib run hxpkg install

      - name: Setup Lime from FunkinCrew fork
        run: |
          rm -rf .haxelib/lime
          git clone https://github.com/FunkinCrew/lime .haxelib/lime/git
          git -C .haxelib/lime/git checkout 6421de16b9dfa4fb55c19f12db65d392a57585c8
          git -C .haxelib/lime/git submodule update --init --recursive --force
          haxelib dev lime .haxelib/lime/git

      - name: Patch Lime sources
        run: |
          LIME_SRC=$(find .haxelib/lime/git -name "BMP.cpp" -path "*/graphics/format/*" 2>/dev/null | head -1 | xargs -I{} dirname {})
          if [ -z "$LIME_SRC" ]; then
            echo "BMP.cpp not found, listing lime structure:"
            find .haxelib/lime/git -maxdepth 4 -type d | head -30
            exit 1
          fi
          echo "Found: $LIME_SRC"
          for FILE in "$LIME_SRC"/*.cpp; do
            grep -q '#include <SDL3_image/SDL_image.h>' "$FILE" || continue
            grep -q '#include <climits>' "$FILE" && continue
            sed -i '/#include <SDL3_image\/SDL_image.h>/a #include <climits>' "$FILE"
            echo "patched: $(basename $FILE)"
          done

      - name: Cache Lime ndll
        id: cache_lime
        uses: actions/cache@v4
        with:
          path: .haxelib/lime/git/ndll
          key: lime-ndll-${{ hashFiles('.haxelib/lime/git/.git/HEAD') }}-v1

      - name: Rebuild Lime Linux
        if: steps.cache_lime.outputs.cache-hit != 'true'
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          haxelib run lime rebuild cpp -release -DHXCPP_COMPILE_THREADS=4
          if [ ! -f .haxelib/lime/git/ndll/Linux64/lime.ndll ]; then
            echo "ERROR: lime.ndll not found"
            exit 1
          fi

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_BUILD_TOOLS 34.0.0
          haxelib run lime config ANDROID_PLATFORM android-34
          haxelib run lime config ANDROID_SETUP true

      - name: Rebuild Lime Android
        if: steps.cache_lime.outputs.cache-hit != 'true'
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          haxelib run lime rebuild android -release -DHXCPP_COMPILE_THREADS=4
          if [ ! -f .haxelib/lime/git/ndll/Android/liblime-64.so ]; then
            echo "ERROR: liblime-64.so not found"
            exit 1
          fi

      - name: Compile
        run: |
          haxelib run lime build android -release ${{ inputs.buildFlags != '' && format('-D {0}', inputs.buildFlags) || '' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImpostorLegacy-android
          path: export/release/android/bin/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
