name: Build Android

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      buildFlags:
        required: false
        type: string

env:
  HAXE_VERSION: 4.3.7

jobs:
  Android:
    name: Build Android
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libasound2-dev

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-android-${{ hashFiles('.hxpkg') }}
          restore-keys: haxelib-android-

      - name: Install Haxe Libraries
        run: |
          haxelib setup ~/haxelib --quiet
          haxelib install hxpkg --quiet
          haxelib run hxpkg install

      - name: Cache Lime ndll
        id: cache_lime_ndll
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib/lime/git/ndll/Linux64
            ~/haxelib/lime/git/ndll/Android
          key: lime-ndll-${{ hashFiles('.hxpkg') }}-v1

      - name: Rebuild Lime Linux
        if: steps.cache_lime_ndll.outputs.cache-hit != 'true'
        run: |
          haxelib run lime rebuild cpp -release -DHXCPP_COMPILE_THREADS=$(nproc)
          if [ ! -f ~/haxelib/lime/git/ndll/Linux64/lime.ndll ]; then
            find ~/haxelib/lime -name "lime.ndll" 2>/dev/null || true
            echo "ERROR: lime.ndll not found after rebuild"
            exit 1
          fi
          echo "lime.ndll OK"

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK      $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME        $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP    true

      - name: Rebuild Lime Android
        if: steps.cache_lime_ndll.outputs.cache-hit != 'true'
        run: |
          haxelib run lime rebuild android -release -DHXCPP_COMPILE_THREADS=$(nproc)
          if [ ! -f ~/haxelib/lime/git/ndll/Android/liblime-64.so ]; then
            find ~/haxelib/lime -name "liblime*.so" 2>/dev/null || true
            echo "ERROR: liblime-64.so not found after rebuild"
            exit 1
          fi
          echo "liblime-64.so OK"

      - name: Set Compiler Threads
        run: echo "CPUS=$(nproc)" >> $GITHUB_ENV

      - name: Compile
        run: |
          FLAGS="-release -DHXCPP_COMPILE_THREADS=${{ env.CPUS }} -DHXCPP_OPTIMIZE_FOR_CPUID=1"
          if [ -n "${{ inputs.buildFlags }}" ]; then
            FLAGS="$FLAGS ${{ inputs.buildFlags }}"
          fi
          haxelib run lime build android $FLAGS

      - name: Verify APK
        run: |
          APK=$(find export/release/android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi
          echo "APK: $APK ($(du -sh $APK | cut -f1))"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android
          path: |
            export/*/cpp/build/**.log
            *.log
          if-no-files-found: ignore